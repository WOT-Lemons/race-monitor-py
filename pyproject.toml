[project]
name = "race-monitor"
version = "0.0.0"
description = "A Python library for Race Monitor"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/race_monitor"]

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "pdoc>=14",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
